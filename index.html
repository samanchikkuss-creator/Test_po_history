<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Тесты по Истории</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #a5b4fc;
            --success: #10b981;
            --success-dark: #059669;
            --error: #ef4444;
            --error-dark: #dc2626;
            --warning: #f59e0b;
            --info: #3b82f6;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .search-container {
            margin-bottom: 30px;
        }

        .search-input {
            width: 100%;
            max-width: 500px;
            padding: 14px 24px;
            border: 2px solid var(--border);
            border-radius: 50px;
            font-size: 1em;
            outline: none;
            transition: all 0.3s ease;
            background: var(--surface);
            color: var(--text);
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .search-results {
            margin-top: 15px;
            max-height: 400px;
            overflow-y: auto;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stage-card {
            background: var(--surface);
            border-radius: 20px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid var(--border);
            color: var(--text);
        }

        .stage-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
        }

        .stats-panel {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 20px;
            padding: 20px;
            color: white;
            margin-bottom: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }

        .stat-card {
            text-align: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
        }

        .stat-label {
            font-size: 0.85rem;
            opacity: 0.9;
            margin-top: 5px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--error), var(--error-dark));
            color: white;
        }

        .btn-warning {
            background: linear-gradient(135deg, var(--warning), #ea580c);
            color: white;
        }

        .option {
            padding: 16px 20px;
            border: 2px solid var(--border);
            border-radius: 16px;
            cursor: pointer;
            background: var(--surface);
            color: var(--text);
            width: 100%;
            margin-bottom: 12px;
            transition: all 0.3s ease;
            text-align: left;
            font-size: 1em;
        }

        .option:hover:not(:disabled) {
            transform: translateX(5px);
            border-color: var(--primary);
        }

        .option.correct {
            background: var(--success);
            color: white;
            border-color: var(--success);
        }

        .option.wrong {
            background: var(--error);
            color: white;
            border-color: var(--error);
        }

        .option:active:not(:disabled) {
            transform: scale(0.98);
        }

        .option:disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }

        .numbers-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
            max-height: 140px;
            overflow-y: auto;
            padding: 15px;
            background: var(--surface);
            border-radius: 16px;
            border: 2px solid var(--border);
        }

        .num-item {
            min-width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            background: var(--surface);
            color: var(--text);
        }

        .num-item:hover {
            border-color: var(--primary);
            transform: scale(1.05);
        }

        .num-item.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .num-item.correct {
            background: var(--success);
            color: white;
            border-color: var(--success);
        }

        .num-item.wrong {
            background: var(--error);
            color: white;
            border-color: var(--error);
        }

        .progress-section {
            margin: 20px 0;
        }

        .progress-bar {
            height: 12px;
            background: var(--border);
            border-radius: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            border-radius: 20px;
            transition: width 0.5s ease;
        }

        .timer {
            font-size: 2rem;
            font-weight: bold;
            font-family: monospace;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .question-text {
            background: var(--surface);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            border-left: 5px solid var(--primary);
            font-size: 1.1rem;
            line-height: 1.5;
            color: var(--text);
        }

        .side-panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: 400px;
            max-width: 90%;
            height: 100%;
            background: var(--surface);
            box-shadow: -5px 0 25px rgba(0, 0, 0, 0.1);
            transition: 0.3s;
            z-index: 1000;
            padding: 80px 20px 20px;
            overflow-y: auto;
            color: var(--text);
        }

        .side-panel.active {
            right: 0;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            display: none;
            z-index: 999;
        }

        .overlay.active {
            display: block;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 12px 24px;
            border-radius: 12px;
            background: var(--surface);
            color: var(--text);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            z-index: 1100;
            animation: fadeIn 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .hidden {
            display: none;
        }

        .grade-badge {
            font-size: 5rem;
            font-weight: bold;
            margin: 20px 0;
        }

        .stats-box {
            background: var(--surface);
            border-radius: 20px;
            padding: 25px;
            margin: 20px 0;
        }

        @media (max-width: 768px) {
            body { padding: 15px; }
            h1 { font-size: 1.3rem; }
            .option { padding: 12px 16px; }
            .num-item { min-width: 40px; height: 40px; font-size: 0.85rem; }
            .btn { padding: 10px 16px; font-size: 0.85rem; }
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--border);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-dark);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <i class="fas fa-brain"></i>
                Тесты по Истории
                <i class="fas fa-robot"></i>
            </h1>
        </div>

        <div id="menu-screen">
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="🔍 Поиск вопросов..." onkeyup="searchQuestions()">
                <div id="searchResults" class="search-results"></div>
            </div>

            <div class="stats-panel">
                <h3><i class="fas fa-chart-line"></i> Ваша статистика</h3>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="totalTests">0</div>
                        <div class="stat-label">Пройдено тестов</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="avgScore">0%</div>
                        <div class="stat-label">Средний результат</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="totalErrors">0</div>
                        <div class="stat-label">Ошибок всего</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="bestScore">0%</div>
                        <div class="stat-label">Лучший результат</div>
                    </div>
                </div>
            </div>

            <div style="display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap;">
                <button class="btn btn-primary" onclick="startErrorsOnly()">
                    <i class="fas fa-bug"></i> Только ошибки
                </button>
                <button class="btn btn-primary" onclick="startRandom30()">
                    <i class="fas fa-random"></i> Случайные 30
                </button>
                <button class="btn btn-primary" onclick="startRandom50()">
                    <i class="fas fa-random"></i> Случайные 50
                </button>
                <button class="btn btn-primary" onclick="startRandom100()">
                    <i class="fas fa-random"></i> Случайные 100
                </button>
                <button class="btn btn-warning" onclick="toggleSidePanel()">
                    <i class="fas fa-history"></i> История
                </button>
            </div>

            <div class="menu-grid" id="stages-container"></div>
        </div>

        <div id="quiz-screen" class="hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;">
                <div class="timer" id="timer">60:00</div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-primary" onclick="showHint()">
                        <i class="fas fa-lightbulb"></i> Подсказка
                    </button>
                    <button class="btn btn-danger" onclick="confirmFinish()">
                        <i class="fas fa-check-circle"></i> Завершить
                    </button>
                </div>
            </div>

            <div class="progress-section">
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
                <div id="progress-text" style="text-align: center; margin-top: 8px;"></div>
            </div>

            <div id="question-counter" style="margin-bottom: 15px;"></div>

            <div class="numbers-nav" id="numbers-nav"></div>

            <div class="question-text" id="question-text">
                <div id="q-text"></div>
            </div>

            <div id="options-box"></div>

            <div style="display: flex; gap: 15px; margin-top: 25px;">
                <button id="prev-btn" class="btn" style="flex: 1; background: var(--border);" onclick="prevQuestion()">
                    <i class="fas fa-arrow-left"></i> Назад
                </button>
                <button id="next-btn" class="btn btn-primary" style="flex: 1;" onclick="nextQuestion()">
                    Далее <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </div>

        <div id="result-screen" class="hidden" style="text-align: center;">
            <div class="grade-badge" id="grade-display"></div>
            <div class="stats-box">
                <p id="stats-display" style="font-size: 1.5rem; font-weight: 600; margin-bottom: 15px;"></p>
                <p id="details-display"></p>
            </div>
            <div style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
                <button class="btn btn-primary" onclick="location.reload()">
                    <i class="fas fa-home"></i> В меню
                </button>
                <button class="btn" style="background: var(--success); color: white;" onclick="shareResult()">
                    <i class="fas fa-share-alt"></i> Поделиться
                </button>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleSidePanel()"></div>
    <div class="side-panel" id="side-panel">
        <button onclick="toggleSidePanel()" style="float: right; background: none; border: none; font-size: 24px; cursor: pointer; color: inherit;">✕</button>
        <h2><i class="fas fa-chart-simple"></i> История результатов</h2>
        <div id="results-history" style="max-height: 300px; overflow-y: auto; margin: 20px 0;"></div>
        <button class="btn btn-danger" onclick="clearResultsOnly()" style="width: 100%;">
            <i class="fas fa-trash"></i> Очистить историю
        </button>
        
        <hr style="margin: 20px 0; border-color: var(--border);">
        
        <h2><i class="fas fa-exclamation-triangle"></i> Ошибки</h2>
        <div id="errors-history" style="max-height: 300px; overflow-y: auto; margin: 20px 0;"></div>
        <button class="btn btn-danger" onclick="clearErrorsOnly()" style="width: 100%;">
            <i class="fas fa-trash"></i> Очистить ошибки
        </button>
    </div>

    <script>
        const allQuestionsRawData = [
    // Вопрос 1

    ["Какое событие произошло позже остальных?", "Вступление Узбекистана в ООН", "Первые выборы Президента Республики Узбекистан на альтернативной основе", "Вступление Узбекистана в ООН", "Введение института президентства в Узбекистане", "Принятие Закона «Об основах государственной независимости Республики Узбекистан»"],

    ["С чьим именем связан период «оттепели»?", "Н.С. Хрущева", "Н.С. Хрущева", "И.В. Сталина", "Л.И.Брежнева", "М.С. Горбачева"],

    ["Какое событие произошло 1 сентября 1939 года?", "Началась вторая мировая война", "Национально-территориальное размежевание", "В УзССР начались политические репрессии", "Началась вторая мировая война", "Началась коллективизация сельского хозяйства"],
    // Вопрос 221
    ["Назовите крупное антиарабское восстание", "Восстание Рафи ибн Лейса", "Восстание Рафи ибн Лейса", "Восстание в Алае", "Восстание Дукчи Ишана", "Восстание Абруя"],
    // Вопрос 222
    ["Когда был свержен монархический режим в Бухарском эмирате?", "В 1920 году", "В 1873 году", "В 1868 году", "В 1920 году", "В 1917 году"],
    // Вопрос 223
    ["Сколько целей содержит «Стратегия – 2030»?", "100", "100", "68", "33", "55"],
    // Вопрос 224
    ["Назовите год рождения Мирзо Улугбека.", "1394 г.", "1405 г.", "1336 г.", "1394 г.", "1227 г."],
    // Вопрос 225
    ["Стратегия развития состоит из 7 приоритетных направлений. Укажите несоответствие:", "4 направление - Подход к общечеловеческим проблемам исходя из национальных интересов", "1 направление - Построение народного государства путем обеспечения интересов человека и дальнейшего развития свободного гражданского общества", "2 направление - Превращение принципов справедливости и верховенства закона в основное и необходимое условие развития страны", "3 направление - Развитие национальной экономики, обеспечение высоких темпов ее роста", "4 направление - Подход к общечеловеческим проблемам исходя из национальных интересов"]
];

        const allQuestionsRaw = allQuestionsRawData.filter(q => q.length >= 5);
        const TOTAL_QUESTIONS = allQuestionsRaw.length;
        const QUESTIONS_PER_STAGE = 30;

        let currentQuestions = [];
        let currentIdx = 0;
        let timerInterval;

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'info-circle'}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function showHint() {
            if (currentQuestions[currentIdx]) {
                const q = currentQuestions[currentIdx];
                const hint = `💡 Правильный ответ: "${q.options[q.correctIdx].substring(0, 50)}${q.options[q.correctIdx].length > 50 ? '...' : ''}"`;
                showToast(hint, 'info');
            }
        }

        function shareResult() {
            const stats = document.getElementById('stats-display').innerText;
            navigator.clipboard.writeText(`Мой результат по ИИ и NLP: ${stats}`);
            showToast('Результат скопирован! 📋');
        }

        function updateStats() {
            const results = JSON.parse(localStorage.getItem('tr_results') || '[]');
            const errors = JSON.parse(localStorage.getItem('tr_errors') || '[]');
            
            document.getElementById('totalTests').textContent = results.length;
            document.getElementById('totalErrors').textContent = errors.length;
            
            if (results.length > 0) {
                const avg = results.reduce((a, b) => a + b.score, 0) / results.length;
                document.getElementById('avgScore').textContent = Math.round(avg) + '%';
                const best = Math.max(...results.map(r => r.score));
                document.getElementById('bestScore').textContent = best + '%';
            }
        }

        function searchQuestions() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const resultsDiv = document.getElementById('searchResults');
            if (!term) {
                resultsDiv.innerHTML = '';
                return;
            }
            
            const results = [];
            for (let i = 0; i < allQuestionsRaw.length; i++) {
                if (allQuestionsRaw[i][0].toLowerCase().includes(term)) {
                    results.push({ index: i, question: allQuestionsRaw[i][0] });
                }
            }
            
            if (results.length === 0) {
                resultsDiv.innerHTML = '<div style="padding: 20px; text-align: center;">Ничего не найдено 🔍</div>';
                return;
            }
            
            resultsDiv.innerHTML = results.slice(0, 20).map(r => `
                <div class="stage-card" style="margin-bottom: 10px; cursor: pointer;" onclick="startSingleQuestion(${r.index})">
                    <strong>Вопрос ${r.index + 1}</strong>
                    <p style="margin-top: 8px;">${r.question.substring(0, 100)}${r.question.length > 100 ? '...' : ''}</p>
                </div>
            `).join('');
        }

        function startSingleQuestion(idx) {
            startTest([allQuestionsRaw[idx]], 'Один вопрос');
            setTimeout(() => {
                document.getElementById('searchResults').innerHTML = '';
                document.getElementById('searchInput').value = '';
            }, 100);
        }

        function startErrorsOnly() {
            const errors = JSON.parse(localStorage.getItem('tr_errors') || '[]');
            if (errors.length === 0) {
                showToast('Нет вопросов с ошибками! 🎉', 'info');
                return;
            }
            const errorQuestions = errors.map(e => allQuestionsRaw.find(q => q[0] === e.q)).filter(q => q);
            if (errorQuestions.length === 0) return;
            startTest(errorQuestions, 'Только ошибки');
        }

        function startRandom30() { startRandomN(30); }
        function startRandom50() { startRandomN(50); }
        function startRandom100() { startRandomN(100); }
        
        function startRandomN(n) {
            // Перемешивание методом Фишера-Йетса (более случайное)
            const shuffled = [...allQuestionsRaw];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            const takeCount = Math.min(n, TOTAL_QUESTIONS);
            startTest(shuffled.slice(0, takeCount), `Случайные ${takeCount}`);
        }

        function startTest(qs, name) {
            currentQuestions = qs.map((q, idx) => {
                const correct = q[1];
                // Перемешиваем варианты ответов
                const opts = [...q.slice(1)];
                for (let i = opts.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [opts[i], opts[j]] = [opts[j], opts[i]];
                }
                const globalIdx = allQuestionsRaw.findIndex(x => x[0] === q[0]);
                return { 
                    q: q[0], 
                    options: opts, 
                    correctIdx: opts.indexOf(correct), 
                    user: null, 
                    globalIndex: globalIdx >= 0 ? globalIdx : idx 
                };
            });
            
            currentIdx = 0;
            
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            
            renderNavigation();
            renderQuestion();
            startTimer();
        }

        function startTimer() {
            let time = 3600;
            if (timerInterval) clearInterval(timerInterval);
            const update = () => {
                time--;
                const m = Math.floor(time / 60);
                const s = time % 60;
                document.getElementById('timer').textContent = `${m}:${s.toString().padStart(2, '0')}`;
                if (time <= 0) { 
                    clearInterval(timerInterval); 
                    showResult(); 
                }
            };
            update();
            timerInterval = setInterval(update, 1000);
        }

        function renderNavigation() {
            const nav = document.getElementById('numbers-nav');
            nav.innerHTML = '';
            for (let i = 0; i < currentQuestions.length; i++) {
                const btn = document.createElement('div');
                btn.className = 'num-item';
                btn.textContent = i + 1;
                btn.onclick = () => { currentIdx = i; renderQuestion(); updateNavActive(); };
                nav.appendChild(btn);
            }
            updateNavActive();
        }

        function updateNavActive() {
            document.querySelectorAll('.num-item').forEach((el, i) => {
                el.classList.remove('active');
                if (i === currentIdx) el.classList.add('active');
                if (currentQuestions[i] && currentQuestions[i].user !== null) {
                    el.classList.remove('correct', 'wrong');
                    el.classList.add(currentQuestions[i].user === currentQuestions[i].correctIdx ? 'correct' : 'wrong');
                }
            });
        }

        function renderQuestion() {
            const q = currentQuestions[currentIdx];
            if (!q) return;
            
            const progress = ((currentIdx + 1) / currentQuestions.length * 100).toFixed(1);
            document.getElementById('progress-fill').style.width = `${progress}%`;
            document.getElementById('progress-text').textContent = `Прогресс: ${currentIdx + 1}/${currentQuestions.length} (${progress}%)`;
            document.getElementById('question-counter').innerHTML = `<i class="fas fa-question-circle"></i> Вопрос ${currentIdx + 1} из ${currentQuestions.length}`;
            
            document.getElementById('q-text').innerHTML = `<span style="background: var(--primary); color: white; padding: 4px 12px; border-radius: 20px; display: inline-block; margin-bottom: 10px;">Вопрос ${q.globalIndex + 1}</span><br>${q.q}`;
            
            const box = document.getElementById('options-box');
            box.innerHTML = '';
            
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option';
                btn.innerHTML = `<strong>${String.fromCharCode(65 + i)})</strong> ${opt}`;
                if (q.user !== null) {
                    btn.disabled = true;
                    if (i === q.correctIdx) btn.classList.add('correct');
                    if (i === q.user && i !== q.correctIdx) btn.classList.add('wrong');
                } else {
                    btn.onclick = () => {
                        q.user = i;
                        const isCorrect = i === q.correctIdx;
                        if (isCorrect) {
                            showToast('✅ Правильно!', 'success');
                        } else {
                            showToast(`❌ Неправильно! Правильный ответ: ${q.options[q.correctIdx]}`, 'info');
                        }
                        renderQuestion();
                        updateNavActive();
                    };
                }
                box.appendChild(btn);
            });
            
            updateNavActive();
        }

        function prevQuestion() {
            if (currentIdx > 0) { 
                currentIdx--; 
                renderQuestion(); 
            }
        }

        function nextQuestion() {
            if (currentIdx < currentQuestions.length - 1) { 
                currentIdx++; 
                renderQuestion(); 
            } else { 
                showResult(); 
            }
        }

        function confirmFinish() {
            if (confirm('Завершить тест?')) showResult();
        }

        function showResult() {
            clearInterval(timerInterval);
            const correct = currentQuestions.filter(q => q.user === q.correctIdx).length;
            const percent = Math.round((correct / currentQuestions.length) * 100);
            let grade, color;
            if (percent >= 85) { grade = 5; color = '#10b981'; }
            else if (percent >= 70) { grade = 4; color = '#3b82f6'; }
            else if (percent >= 60) { grade = 3; color = '#f59e0b'; }
            else { grade = 2; color = '#ef4444'; }
            
            document.getElementById('grade-display').textContent = grade;
            document.getElementById('grade-display').style.color = color;
            document.getElementById('stats-display').innerHTML = `${correct}/${currentQuestions.length} (${percent}%)`;
            document.getElementById('details-display').innerHTML = `✅ Правильных: ${correct}<br>❌ Ошибок: ${currentQuestions.filter(q => q.user !== null && q.user !== q.correctIdx).length}<br>⏸ Без ответа: ${currentQuestions.filter(q => q.user === null).length}`;
            
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            
            const results = JSON.parse(localStorage.getItem('tr_results') || '[]');
            results.unshift({ date: new Date().toLocaleString(), score: percent, correct, total: currentQuestions.length, grade });
            localStorage.setItem('tr_results', JSON.stringify(results.slice(0, 50)));
            
            const errors = JSON.parse(localStorage.getItem('tr_errors') || '[]');
            currentQuestions.filter(q => q.user !== q.correctIdx).forEach(e => {
                if (!errors.some(err => err.q === e.q)) {
                    errors.unshift({ q: e.q, a: e.options[e.correctIdx], date: new Date().toLocaleString() });
                }
            });
            localStorage.setItem('tr_errors', JSON.stringify(errors.slice(0, 100)));
            
            updateStats();
            renderSidebar();
        }

        function renderSidebar() {
            const results = JSON.parse(localStorage.getItem('tr_results') || '[]');
            const errors = JSON.parse(localStorage.getItem('tr_errors') || '[]');
            
            const rDiv = document.getElementById('results-history');
            rDiv.innerHTML = results.slice(0, 15).map(r => `
                <div style="padding: 12px; border-bottom: 1px solid var(--border);">
                    <div><strong>${r.date}</strong></div>
                    <div>Оценка: ${r.grade} (${r.score}%)</div>
                    <div>${r.correct}/${r.total} правильных</div>
                </div>
            `).join('');
            if (results.length === 0) rDiv.innerHTML = '<p style="text-align: center;">Нет записей</p>';
            
            const eDiv = document.getElementById('errors-history');
            eDiv.innerHTML = errors.slice(0, 15).map(e => `
                <div style="padding: 12px; border-bottom: 1px solid var(--border); margin-bottom: 10px; background: rgba(239, 68, 68, 0.1); border-radius: 12px;">
                    <div><strong>❌ Вопрос:</strong> ${e.q.substring(0, 80)}${e.q.length > 80 ? '...' : ''}</div>
                    <div><strong>✅ Ответ:</strong> ${e.a}</div>
                    <small>${e.date}</small>
                </div>
            `).join('');
            if (errors.length === 0) eDiv.innerHTML = '<p style="text-align: center;">Ошибок нет! 🎉</p>';
        }

        function clearResultsOnly() {
            if (confirm('Очистить историю результатов?')) {
                localStorage.removeItem('tr_results');
                updateStats();
                renderSidebar();
                showToast('История очищена');
            }
        }

        function clearErrorsOnly() {
            if (confirm('Очистить список ошибок?')) {
                localStorage.removeItem('tr_errors');
                renderSidebar();
                showToast('Ошибки очищены');
            }
        }

        function toggleSidePanel() {
            document.getElementById('side-panel').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
            if (document.getElementById('side-panel').classList.contains('active')) renderSidebar();
        }

        function initMenu() {
            const container = document.getElementById('stages-container');
            container.innerHTML = '';
            
            const stages = Math.ceil(TOTAL_QUESTIONS / QUESTIONS_PER_STAGE);
            for (let i = 0; i < stages; i++) {
                const start = i * QUESTIONS_PER_STAGE;
                const end = Math.min(start + QUESTIONS_PER_STAGE, TOTAL_QUESTIONS);
                const card = document.createElement('div');
                card.className = 'stage-card';
                card.innerHTML = `
                    <i class="fas fa-layer-group" style="font-size: 32px; color: var(--primary); margin-bottom: 10px;"></i>
                    <h3>Этап ${i + 1}</h3>
                    <p>Вопросы ${start + 1} - ${end}</p>
                    <div style="font-size: 0.85rem; opacity: 0.7;">${end - start} вопросов</div>
                `;
                card.onclick = () => startTest(allQuestionsRaw.slice(start, end), `Этап ${i + 1}`);
                container.appendChild(card);
            }
            
            const allCard = document.createElement('div');
            allCard.className = 'stage-card';
            allCard.innerHTML = `
                <i class="fas fa-database" style="font-size: 32px; color: var(--success); margin-bottom: 10px;"></i>
                <h3>Все вопросы</h3>
                <p>1 - ${TOTAL_QUESTIONS}</p>
                <div style="font-size: 0.85rem; opacity: 0.7;">${TOTAL_QUESTIONS} вопросов</div>
            `;
            allCard.onclick = () => startTest([...allQuestionsRaw], 'Все вопросы');
            container.appendChild(allCard);
            
            updateStats();
            renderSidebar();
        }

        initMenu();
    </script>
